apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: digital-backbone-adapter-api
  description: APIs for the Howden Digital Backbone integration platform
spec:
  type: openapi
  lifecycle: production
  owner: group:default/platform-team
  definition: |
    openapi: 3.0.3
    info:
      title: Digital Backbone Adapter API
      version: 1.0.0
      description: |
        APIs for publishing Digital Backbone events and managing parties.

        Request standards:
        - Content-Type: application/json
        - Property names use camelCase
        - Dates use ISO 8601 date-time format
        - IDs are strings
        - x-correlation-id header is required
    servers:
      - url: https://api.dbb.howdengrp.com

    paths:
      /events/opportunity-status-updated:
        post:
          summary: Opportunity Status Updated
          parameters:
            - name: x-correlation-id
              in: header
              required: true
              schema:
                type: string
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  required:
                    - opportunityId
                    - status
                    - updatedAt
                  properties:
                    opportunityId:
                      type: string
                    status:
                      type: string
                    updatedAt:
                      type: string
                      format: date-time
          responses:
            "200":
              description: Message accepted
            "404":
              description: Message in the wrong format

      /events/trial-balance-created:
        post:
          summary: Trial Balance Created
          parameters:
            - name: x-correlation-id
              in: header
              required: true
              schema:
                type: string
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  required:
                    - balanceId
                    - createdAt
                  properties:
                    balanceId:
                      type: string
                    createdAt:
                      type: string
                      format: date-time
          responses:
            "200":
              description: Message accepted
            "404":
              description: Message in the wrong format

      /events/party-updated:
        post:
          summary: Party Updated
          parameters:
            - name: x-correlation-id
              in: header
              required: true
              schema:
                type: string
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  required:
                    - partyId
                    - updatedAt
                  properties:
                    partyId:
                      type: string
                    updatedAt:
                      type: string
                      format: date-time
          responses:
            "200":
              description: Message accepted
            "404":
              description: Message in the wrong format

      /parties:
        post:
          summary: Create Party
          parameters:
            - name: x-correlation-id
              in: header
              required: true
              schema:
                type: string
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                    type:
                      type: string
          responses:
            "200":
              description: Message accepted
            "404":
              description: Message in the wrong format

      /parties/{partyId}:
        get:
          summary: Get Party
          parameters:
            - name: partyId
              in: path
              required: true
              schema:
                type: string
            - name: x-correlation-id
              in: header
              required: true
              schema:
                type: string
          responses:
            "200":
              description: Message accepted
            "404":
              description: Message in the wrong format

        patch:
          summary: Update Party
          parameters:
            - name: partyId
              in: path
              required: true
              schema:
                type: string
            - name: x-correlation-id
              in: header
              required: true
              schema:
                type: string
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    name:
                      type: string
                    type:
                      type: string
          responses:
            "200":
              description: Message accepted
            "404":
              description: Message in the wrong format